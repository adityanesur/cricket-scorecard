<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>PREMIER GULLY · perfect edit</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000'/%3E%3Crect x='30' y='25' width='8' height='50' fill='%23dba059'/%3E%3Crect x='46' y='25' width='8' height='50' fill='%23dba059'/%3E%3Crect x='62' y='25' width='8' height='50' fill='%23dba059'/%3E%3Crect x='25' y='70' width='50' height='8' fill='%23808080'/%3E%3Ccircle cx='50' cy='20' r='6' fill='%23ff4444'/%3E%3C/svg%3E">
    <style>
        /* ===== PROFESSIONAL RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0c1117;
            background-image: radial-gradient(circle at 70% 20%, #1e2a36 0%, #0a0e12 90%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(0.75rem, 2.5vw, 2rem);
        }

        /* ===== ELEGANT GLASS PANEL ===== */
        .scoreboard {
            max-width: 1300px;
            width: 100%;
            background: rgba(18, 25, 32, 0.85);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8), 
                        0 0 0 1px rgba(0, 255, 255, 0.1) inset,
                        0 0 30px rgba(0, 255, 255, 0.2);
            padding: clamp(1.5rem, 4vw, 2.8rem);
            color: #ecf3f8;
        }

        /* ===== HEADER SECTION ===== */
        .header-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.25rem 1.5rem;
            margin-bottom: 2rem;
        }

        .title-section h1 {
            font-weight: 600;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #ffffff, #b0dcff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(0, 255, 255, 0.3));
        }

        .title-section p {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            color: #99bcd0;
            font-weight: 350;
            letter-spacing: 0.3px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        .action-btns {
            display: flex;
            gap: 0.9rem;
            flex-wrap: wrap;
        }

        .premium-btn {
            background: rgba(20, 35, 48, 0.9);
            border: 1.5px solid #3f6990;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            color: #d5ecff;
            box-shadow: 0 4px 12px rgba(0, 20, 40, 0.6),
                        0 0 15px rgba(0, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(5px);
        }

        .premium-btn:hover {
            background: #1f405d;
            border-color: #7bb0da;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px -6px #2f5570,
                        0 0 25px rgba(0, 255, 255, 0.4);
        }

        /* ===== MAIN SCORE PANEL ===== */
        .runs-panel {
            background: #0f1a21d9;
            border-radius: 40px;
            padding: clamp(1.2rem, 3vw, 2rem);
            margin-bottom: 2.2rem;
            border: 1px solid #2e5570;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6),
                        0 0 0 1px rgba(0, 255, 255, 0.1) inset,
                        0 0 30px rgba(0, 255, 255, 0.15);
        }

        .total-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem 2rem;
        }

        .score-block {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .score-label {
            font-size: clamp(0.9rem, 2.8vw, 1.2rem);
            font-weight: 350;
            color: #93bcd5;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }

        .score-value {
            font-size: clamp(3.5rem, 14vw, 6.2rem);
            font-weight: 600;
            background: linear-gradient(145deg, #ffffff, #b0e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.4));
        }

        .overs-value {
            font-size: clamp(2.2rem, 7vw, 3.2rem);
            font-weight: 450;
            color: #ddeeff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .ball-count {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            background: #1e3343;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            color: #bfe2ff;
            border: 1px solid #3f7ea0;
            font-weight: 400;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        /* ===== BUTTON GRID ===== */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 0.9rem;
            margin: 2rem 0 1.8rem;
        }

        .action-btn {
            background: #182b36;
            border: 1.5px solid #2f6991;
            padding: 1rem 0.3rem;
            border-radius: 40px;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-weight: 600;
            color: #d1ecff;
            box-shadow: 0 6px 14px rgba(0, 15, 30, 0.8),
                        0 0 15px rgba(0, 255, 255, 0.15);
            transition: all 0.18s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .action-btn:hover {
            background: #1f405a;
            border-color: #80b5e0;
            transform: translateY(-3px);
            box-shadow: 0 15px 22px -8px #1f4c6e,
                        0 0 25px rgba(0, 255, 255, 0.3);
        }

        .special-4 { border-left: 6px solid #2aa86b; }
        .special-6 { border-left: 6px solid #e68a2e; }
        .special-wicket { border-left: 6px solid #c44c4c; }
        .special-wide { border-left: 6px solid #9b7bdb; }
        .special-noball { border-left: 6px solid #d96ba5; }

        /* undo button special */
        .undo-btn {
            background: #2c3d4e;
            border-color: #b0b0b0;
            color: #ffe7b0;
        }

        /* ===== CURRENT OVER STRIP ===== */
        .over-history {
            background: #0d1a24d0;
            border-radius: 36px;
            padding: 1.4rem 1.8rem;
            border: 1px solid #30658a;
            box-shadow: 0 0 0 1px #18445f inset,
                        0 0 25px rgba(0, 255, 255, 0.15);
        }

        .over-title {
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 1.8px;
            color: #9cc9f0;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }

        .balls-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .ball-chip {
            background: #1c3140;
            border-radius: 36px;
            padding: 0.45rem 1.4rem;
            font-size: 1rem;
            font-weight: 500;
            border: 1.5px solid #3f80aa;
            color: #e2f0ff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4),
                        0 0 12px rgba(0, 255, 255, 0.2);
            white-space: nowrap;
        }

        .ball-chip.wide, .ball-chip.noball { border-color: #cf9f5e; color: #ffeac2; }
        .ball-chip.wicket { border-color: #d67a7a; color: #ffd9d9; }
        .ball-chip.dot { border-color: #6c8faa; color: #c1d9ec; }

        /* ===== REFINED ANIMATION ===== */
        .animation-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .float-anim {
            background: rgba(0, 15, 25, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 80px;
            padding: 2rem 5rem;
            font-size: clamp(4rem, 22vw, 12rem);
            font-weight: 700;
            color: white;
            text-shadow: 0 10px 30px #0066ff, 0 0 40px cyan;
            transform: scale(0.6);
            animation: fadePop 0.5s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            border: 2px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 90px rgba(0, 255, 255, 0.5);
            white-space: nowrap;
            letter-spacing: 4px;
        }

        @keyframes fadePop {
            0% { opacity: 0; transform: scale(0.5); }
            40% { opacity: 1; transform: scale(1.1); }
            80% { opacity: 0.9; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        /* ===== MODAL & POPUP — PERFECTLY CENTERED ===== */
        .modal, .popup-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 12, 0.7);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal-card, .popup-card {
            background: #172b38;
            max-width: 900px;
            width: 100%;
            border-radius: 48px;
            padding: 2.2rem;
            border: 1px solid #4279a5;
            box-shadow: 0 40px 70px -20px #000, 
                        0 0 0 1px #639ac0 inset,
                        0 0 30px rgba(0, 255, 255, 0.2);
            color: #edf6ff;
            max-height: 80vh;
            overflow-y: auto;
        }

        .popup-card {
            max-width: 420px;
            width: 90%;
            background: #1c3342;
            border-color: #6c9fd1;
            text-align: center;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
            box-shadow: 0 40px 70px -20px #000, 
                        0 0 0 1px #6c9fd1 inset,
                        0 0 40px rgba(0, 255, 255, 0.25);
        }

        .popup-card h2 {
            font-weight: 400;
            color: #b3defa;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            width: 100%;
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        .popup-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin: 0.5rem 0 1.5rem;
            width: 100%;
        }

        .popup-btn {
            background: #254c62;
            border: 1.5px solid #80bbee;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1.4rem;
            color: #e5f3ff;
            cursor: pointer;
            min-width: 85px;
            transition: 0.1s ease;
            flex: 0 1 auto;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
        }

        .popup-btn:hover {
            background: #2f6685;
            border-color: #b0e0ff;
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        #popupCancel {
            border-color: #787f8a;
            background: #2f3e4a;
            min-width: 120px;
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        /* ===== INNINGS DISPLAY — WITH OVER RUNS ===== */
        .innings-card {
            background: #1b3140;
            border-radius: 36px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #467a9e;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }

        .innings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .innings-header strong {
            font-size: 1.3rem;
            font-weight: 500;
            color: #d3edff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        .delete-innings {
            background: #312f4a;
            border: 1px solid #b57f7f;
            border-radius: 30px;
            padding: 0.4rem 1.5rem;
            color: #ffcfcf;
            font-weight: 450;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 100, 100, 0.2);
        }

        .over-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            background: #12303f;
            padding: 0.9rem 1.3rem;
            border-radius: 40px;
            margin-bottom: 0.7rem;
            border-left: 5px solid #5499c9;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .over-label {
            font-weight: 600;
            color: #aacede;
            min-width: 70px;
            font-size: 1rem;
        }

        .over-runs {
            background: #204a60;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffe6a3;
            border: 1px solid #ffb347;
            white-space: nowrap;
            margin-left: 0.2rem;
        }

        .ball-badge {
            background: #204a60;
            border-radius: 30px;
            padding: 0.3rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid #71b0db;
            color: #dff2ff;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }

        .ball-badge:hover {
            background: #2f6680;
            border-color: #b0e0ff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.25);
        }

        .ball-badge.wide, .ball-badge.noball { border-color: #dba059; color: #ffebc8; }
        .ball-badge.wicket { border-color: #cf6f6f; color: #ffdbdb; }
        .ball-badge.dot { border-color: #759bb9; color: #d2ecff; }

        .close-modal {
            background: none;
            border: none;
            font-size: 2.4rem;
            color: #b0d8ff;
            cursor: pointer;
            filter: drop-shadow(0 0 8px cyan);
        }

        /* ===== ULTRA RESPONSIVE TWEAKS ===== */
        @media (max-width: 550px) {
            .button-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .ball-chip {
                padding: 0.3rem 1rem;
                font-size: 0.9rem;
            }
            .over-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .over-label {
                min-width: auto;
            }
            .popup-card {
                width: 95%;
                padding: 1.5rem 1rem;
            }
            .popup-btn {
                font-size: 1.2rem;
                padding: 0.6rem 1.2rem;
                min-width: 70px;
            }
        }

        @media (max-width: 380px) {
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .popup-buttons {
                gap: 0.5rem;
            }
            .popup-btn {
                font-size: 1rem;
                padding: 0.5rem 0.8rem;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="scoreboard">
        <div class="header-grid">
            <div class="title-section">
                <h1>PREMIER GULLY · PERFECT</h1>
                <p>undo · click to edit · over runs</p>
            </div>
            <div class="action-btns">
                <button class="premium-btn undo-btn" id="undoBtn">↩️ UNDO</button>
                <button class="premium-btn" id="resetBtn">➕ NEW INNINGS</button>
                <button class="premium-btn" id="scorecardBtn">📋 INNINGS LIST</button>
            </div>
        </div>

        <div class="runs-panel">
            <div class="total-row">
                <div class="score-block">
                    <span class="score-label">TOTAL</span>
                    <span class="score-value" id="totalRunsDisplay">0</span>
                </div>
                <div class="score-block">
                    <span class="score-label">OVERS</span>
                    <span class="overs-value" id="oversDisplay">0.0</span>
                    <span class="ball-count" id="ballInOverDisplay">0 balls</span>
                </div>
            </div>
        </div>

        <div class="button-grid">
            <button class="action-btn" data-action="1">1</button>
            <button class="action-btn" data-action="2">2</button>
            <button class="action-btn" data-action="3">3</button>
            <button class="action-btn special-4" data-action="4">4</button>
            <button class="action-btn special-6" data-action="6">6</button>
            <button class="action-btn special-wicket" data-action="wicket">W</button>
            <button class="action-btn special-wide" data-action="wide">WD</button>
            <button class="action-btn" data-action="dot">●</button>
            <button class="action-btn special-noball" data-action="noball">NB</button>
        </div>

        <div class="over-history">
            <div class="over-title">CURRENT OVER</div>
            <div class="balls-container" id="currentOverBalls"></div>
        </div>
    </div>

    <!-- modal innings list -->
    <div id="scoreModal" class="modal">
        <div class="modal-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <span style="font-size: 1.6rem;">innings history · click any ball to edit</span>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div id="inningsList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>
    </div>

    <!-- popup for extra runs (and edit) - PERFECTLY CENTERED -->
    <div id="runPopup" class="popup-modal">
        <div class="popup-card">
            <h2 id="popupTitle">select value</h2>
            <div id="popupButtonContainer" class="popup-buttons"></div>
            <button class="popup-btn" id="popupCancel">cancel</button>
        </div>
    </div>

    <div id="animationContainer" class="animation-overlay"></div>

    <script>
        (function() {
            // ---------- STATE WITH UNDO ----------
            let inningsList = [];               // { totalRuns, oversData: [[ball1, ball2...]] }
            let currentInningsIndex = -1;
            let currentOverBalls = [];
            let currentBallCount = 0;
            let totalRuns = 0;

            // undo stack: stores { totalRuns, currentOverBalls, currentBallCount, oversDataCopy, inningsIndex }
            let undoStack = [];

            // helpers
            function getOversString() {
                if (currentInningsIndex === -1) return '0.0';
                let completed = inningsList[currentInningsIndex]?.oversData?.length || 0;
                return `${completed}.${currentBallCount}`;
            }

            function saveCurrent() {
                if (currentInningsIndex === -1) return;
                inningsList[currentInningsIndex].totalRuns = totalRuns;
            }

            // push state for undo
            function pushUndo() {
                if (currentInningsIndex === -1) return;
                // deep copy overs data
                let oversCopy = inningsList[currentInningsIndex].oversData.map(over => [...over]);
                undoStack.push({
                    totalRuns,
                    currentOverBalls: [...currentOverBalls],
                    currentBallCount,
                    oversData: oversCopy,
                    inningsIndex: currentInningsIndex
                });
                // keep stack reasonable
                if (undoStack.length > 20) undoStack.shift();
            }

            function undo() {
                if (undoStack.length === 0) {
                    animate('no undo');
                    return;
                }
                let prev = undoStack.pop();
                if (currentInningsIndex !== prev.inningsIndex) {
                    // if innings changed, ignore (should not happen)
                    return;
                }
                totalRuns = prev.totalRuns;
                currentOverBalls = prev.currentOverBalls;
                currentBallCount = prev.currentBallCount;
                inningsList[currentInningsIndex].oversData = prev.oversData.map(over => [...over]);
                saveCurrent();
                refreshDisplay();
                animate('↩');
            }

            function refreshDisplay() {
                document.getElementById('totalRunsDisplay').innerText = totalRuns;
                document.getElementById('oversDisplay').innerText = getOversString();
                let ballText = currentBallCount + (currentBallCount === 1 ? ' ball' : ' balls');
                document.getElementById('ballInOverDisplay').innerText = ballText;

                const container = document.getElementById('currentOverBalls');
                container.innerHTML = '';
                if (currentInningsIndex === -1) {
                    container.innerHTML = '<span class="ball-chip">— new —</span>';
                    return;
                }
                if (currentOverBalls.length === 0 && currentBallCount === 0) {
                    container.innerHTML = '<span class="ball-chip">ready</span>';
                } else {
                    currentOverBalls.forEach(ball => {
                        const chip = document.createElement('span');
                        chip.className = 'ball-chip';
                        if (ball.includes('WD') || ball.includes('NB')) chip.classList.add('wide');
                        else if (ball.includes('wicket')) chip.classList.add('wicket');
                        else if (ball === 'dot') chip.classList.add('dot');
                        chip.innerText = ball;
                        container.appendChild(chip);
                    });
                }
            }

            function animate(text) {
                const animDiv = document.getElementById('animationContainer');
                const el = document.createElement('div');
                el.className = 'float-anim';
                el.innerText = text;
                animDiv.innerHTML = '';
                animDiv.appendChild(el);
                setTimeout(() => {
                    if (animDiv.firstChild === el) animDiv.innerHTML = '';
                }, 550);
            }

            function startNewInnings() {
                if (currentInningsIndex !== -1) saveCurrent();
                inningsList.push({ totalRuns: 0, oversData: [] });
                currentInningsIndex = inningsList.length - 1;
                totalRuns = 0;
                currentOverBalls = [];
                currentBallCount = 0;
                undoStack = []; // clear undo on new innings
                refreshDisplay();
                animate('NEW');
            }

            function checkActive() {
                if (currentInningsIndex === -1) startNewInnings();
            }

            // core ball handler with undo push
            function handleBall(ballSymbol, runsAdded = 0, isDot = false, noIncrement = false) {
                checkActive();
                pushUndo();  // save state before change

                if (currentBallCount === 6) {
                    if (currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                    currentOverBalls = []; currentBallCount = 0;
                }

                if (!isDot) totalRuns += runsAdded;
                currentOverBalls.push(ballSymbol);

                if (!noIncrement && !(ballSymbol.includes('WD') || ballSymbol.includes('NB'))) {
                    currentBallCount++;
                }

                if (currentBallCount === 6) {
                    inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                    currentOverBalls = []; currentBallCount = 0;
                }
                saveCurrent();
                refreshDisplay();
            }

            // popup with dynamic options - PERFECT LAYOUT
            function showPopup(type, callback, customOptions = null) {
                const popup = document.getElementById('runPopup');
                const titleMap = {
                    'wicket': 'runs before wicket',
                    'wide': 'wide extra',
                    'noball': 'no ball extra',
                    'edit': 'select new value'
                };
                document.getElementById('popupTitle').innerText = titleMap[type] || 'select value';
                
                const btnCont = document.getElementById('popupButtonContainer');
                btnCont.innerHTML = '';
                
                let opts = customOptions || (type === 'wicket' ? [0, 1, 2] : [0, 1]);
                
                opts.forEach(v => {
                    let b = document.createElement('button');
                    b.className = 'popup-btn';
                    b.innerText = (typeof v === 'string') ? v : '+'+v;
                    b.onclick = () => { 
                        popup.style.display='none'; 
                        callback(v); 
                    };
                    btnCont.appendChild(b);
                });

                const cancelBtn = document.getElementById('popupCancel');
                cancelBtn.onclick = (e) => {
                    e.preventDefault();
                    popup.style.display='none';
                };

                popup.style.display = 'flex';
            }

            // action handlers
            function handleRun(v) { handleBall(v.toString(), v, false, false); animate(v.toString()); }
            function handleDot() { handleBall('dot', 0, true, false); animate('⬤'); }

            function handleWicket() {
                showPopup('wicket', (runs) => {
                    checkActive();
                    pushUndo();
                    if (currentBallCount === 6) {
                        if (currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                        currentOverBalls = []; currentBallCount = 0;
                    }
                    totalRuns += runs;
                    currentOverBalls.push(runs ? `wicket+${runs}` : 'wicket');
                    currentBallCount++;
                    if (currentBallCount === 6) {
                        inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                        currentOverBalls = []; currentBallCount = 0;
                    }
                    saveCurrent(); refreshDisplay(); animate('W');
                });
            }

            function handleWide() {
                showPopup('wide', (ex) => {
                    checkActive();
                    pushUndo();
                    if (currentBallCount === 6) {
                        if (currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                        currentOverBalls = []; currentBallCount = 0;
                    }
                    totalRuns += ex;
                    currentOverBalls.push(ex ? `WD+${ex}` : 'WD+0');
                    saveCurrent(); refreshDisplay(); animate('WD');
                });
            }

            function handleNoball() {
                showPopup('noball', (ex) => {
                    checkActive();
                    pushUndo();
                    if (currentBallCount === 6) {
                        if (currentOverBalls.length) inningsList[currentInningsIndex].oversData.push([...currentOverBalls]);
                        currentOverBalls = []; currentBallCount = 0;
                    }
                    totalRuns += ex;
                    currentOverBalls.push(ex ? `NB+${ex}` : 'NB+0');
                    saveCurrent(); refreshDisplay(); animate('NB');
                });
            }

            // calculate runs in an over
            function calculateOverRuns(over) {
                return over.reduce((sum, ball) => {
                    if (ball === 'dot') return sum;
                    if (ball.includes('WD') || ball.includes('NB')) {
                        let match = ball.match(/\+(\d)/);
                        return sum + (match ? parseInt(match[1]) : 0);
                    }
                    if (ball.includes('wicket')) {
                        let match = ball.match(/\+(\d)/);
                        return sum + (match ? parseInt(match[1]) : 0);
                    }
                    let num = parseInt(ball);
                    return sum + (isNaN(num) ? 0 : num);
                }, 0);
            }

            // ---------- EDIT BALL FUNCTIONALITY ----------
            function editBall(inningsIdx, overIdx, ballIdx, oldValue) {
                let options = [];

                if (oldValue.includes('wicket')) {
                    options = ['wicket', 'wicket+1', 'wicket+2'];
                } else if (oldValue.includes('WD')) {
                    options = ['WD+0', 'WD+1'];
                } else if (oldValue.includes('NB')) {
                    options = ['NB+0', 'NB+1'];
                } else if (oldValue === 'dot') {
                    options = ['dot', '1', '2', '3', '4', '6', 'WD+0', 'NB+0', 'wicket'];
                } else {
                    options = ['0','1','2','3','4','6','dot','WD+0','NB+0','wicket'];
                }

                showPopup('edit', (newVal) => {
                    if (currentInningsIndex === inningsIdx) pushUndo();

                    let inns = inningsList[inningsIdx];
                    if (inns && inns.oversData[overIdx] && inns.oversData[overIdx][ballIdx] !== undefined) {
                        inns.oversData[overIdx][ballIdx] = newVal;

                        // recalc total runs for the innings
                        let newTotal = 0;
                        inns.oversData.forEach(over => {
                            over.forEach(ball => {
                                if (ball === 'dot') return;
                                if (ball.includes('WD') || ball.includes('NB')) {
                                    let m = ball.match(/\+(\d)/);
                                    if (m) newTotal += parseInt(m[1]);
                                } else if (ball.includes('wicket')) {
                                    let m = ball.match(/\+(\d)/);
                                    if (m) newTotal += parseInt(m[1]);
                                } else {
                                    let n = parseInt(ball);
                                    if (!isNaN(n)) newTotal += n;
                                }
                            });
                        });
                        inns.totalRuns = newTotal;

                        if (inningsIdx === currentInningsIndex) {
                            totalRuns = newTotal;
                        }
                        saveCurrent();
                        refreshDisplay();
                        openScorecard(); // refresh modal
                        animate('✎');
                    }
                }, options);
            }

            // scorecard with clickable balls and over runs
            function openScorecard() {
                const modal = document.getElementById('scoreModal');
                const listDiv = document.getElementById('inningsList');
                listDiv.innerHTML = '';

                if (inningsList.length === 0) {
                    listDiv.innerHTML = '<div class="innings-card">no innings data</div>';
                } else {
                    inningsList.forEach((inns, idx) => {
                        const card = document.createElement('div');
                        card.className = 'innings-card';
                        card.innerHTML = `
                            <div class="innings-header">
                                <strong>INNINGS ${idx+1}  ·  ${inns.totalRuns} runs</strong>
                                <button class="delete-innings" data-index="${idx}">🗑 delete</button>
                            </div>
                            <div class="overs-grid" id="overs-${idx}"></div>
                        `;
                        listDiv.appendChild(card);

                        const oversDiv = document.getElementById(`overs-${idx}`);
                        if (!inns.oversData.length) {
                            oversDiv.innerHTML = '<div class="over-row">no overs bowled</div>';
                        } else {
                            inns.oversData.forEach((over, oidx) => {
                                const overRuns = calculateOverRuns(over);
                                const row = document.createElement('div');
                                row.className = 'over-row';
                                row.innerHTML = `<span class="over-label">OV${oidx+1}</span><span class="over-runs">${overRuns} runs</span>`;
                                
                                over.forEach((ball, bidx) => {
                                    const badge = document.createElement('span');
                                    badge.className = 'ball-badge';
                                    if (ball.includes('WD') || ball.includes('NB')) badge.classList.add('wide');
                                    else if (ball.includes('wicket')) badge.classList.add('wicket');
                                    else if (ball === 'dot') badge.classList.add('dot');
                                    badge.innerText = ball;
                                    badge.dataset.innings = idx;
                                    badge.dataset.over = oidx;
                                    badge.dataset.ball = bidx;
                                    badge.addEventListener('click', (e) => {
                                        e.stopPropagation();
                                        let i = parseInt(e.target.dataset.innings);
                                        let o = parseInt(e.target.dataset.over);
                                        let b = parseInt(e.target.dataset.ball);
                                        let oldVal = inningsList[i].oversData[o][b];
                                        editBall(i, o, b, oldVal);
                                    });
                                    row.appendChild(badge);
                                });
                                oversDiv.appendChild(row);
                            });
                        }
                    });

                    document.querySelectorAll('.delete-innings').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const idx = parseInt(btn.dataset.index);
                            inningsList.splice(idx, 1);
                            if (inningsList.length === 0) {
                                currentInningsIndex = -1; totalRuns = 0; currentOverBalls = []; currentBallCount = 0;
                            } else {
                                if (currentInningsIndex >= idx) currentInningsIndex--;
                                if (currentInningsIndex < 0) currentInningsIndex = 0;
                                totalRuns = inningsList[currentInningsIndex]?.totalRuns || 0;
                            }
                            undoStack = [];
                            refreshDisplay();
                            openScorecard(); // refresh modal
                        });
                    });
                }
                modal.style.display = 'flex';
            }

            // listeners
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const a = btn.dataset.action;
                    if (a === '1') handleRun(1);
                    else if (a === '2') handleRun(2);
                    else if (a === '3') handleRun(3);
                    else if (a === '4') handleRun(4);
                    else if (a === '6') handleRun(6);
                    else if (a === 'dot') handleDot();
                    else if (a === 'wicket') handleWicket();
                    else if (a === 'wide') handleWide();
                    else if (a === 'noball') handleNoball();
                });
            });

            document.getElementById('undoBtn').addEventListener('click', undo);
            document.getElementById('resetBtn').addEventListener('click', startNewInnings);
            document.getElementById('scorecardBtn').addEventListener('click', openScorecard);
            document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('scoreModal').style.display='none');
            window.addEventListener('click', e => {
                if (e.target === document.getElementById('scoreModal')) document.getElementById('scoreModal').style.display='none';
                if (e.target === document.getElementById('runPopup')) document.getElementById('runPopup').style.display='none';
            });

            // initialise
            startNewInnings();
        })();
    </script>
</body>
</html>
